<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .btn-poe {
            border-color: #764ba2;
        }
        
        .btn-poe:hover {
            border-color: #764ba2;
            box-shadow: 0 10px 30px rgba(118, 75, 162, 0.3);
        }
        
        .btn-huggingface {
            border-color: #FFAA00;
        }
        
        .btn-huggingface:hover {
            border-color: #FFAA00;
            box-shadow: 0 10px 30px rgba(255, 170, 0, 0.3);
        }
        
        .icon {
            font-size: 1.5rem;
            margin-right: 10px;
        }
        
        .info {
            margin-top: 30px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 15px;
            text-align: left;
        }
        
        .info h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .info p {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 AI Video Generator</h1>
        <p class="subtitle">Click a platform to generate videos</p>
        
        <a href="https://poe.com/SVI-2-0-Pro" target="_blank" class="btn btn-poe">
            <span class="icon">🤖</span> SVI 2.0 Pro (Best Quality)
        </a>
        
        <a href="https://huggingface.co/spaces?search=video+generation" target="_blank" class="btn btn-huggingface">
            <span class="icon">🔍</span> HuggingFace Free Spaces
        </a>
        
        <a href="https://runwayml.com/creative-suite/gen-3-alpha/" target="_blank" class="btn">
            <span class="icon">🎨</span> Runway (Sign Up Required)
        </a>
        
        <div class="info">
            <h3>💡 How to use</h3>
            <p>Click any button above to open the AI video generator. 
            Enter your prompt and generate amazing videos for free!</p>
        </div>
    </div>
</body>
</html>
