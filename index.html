<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 40px;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #ccc;
            font-weight: 500;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 15px;
            background: #2a2a2a;
            border: 2px solid #3a3a3a;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 10px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result video {
            width: 100%;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #3a3a3a;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #3a1a1a;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <h1>🎬 AI Video Generator</h1>
    <p class="subtitle">Create amazing videos from text prompts</p>
    
    <div class="container">
        <label for="prompt">Prompt</label>
        <textarea id="prompt" placeholder="A beautiful sunset over the ocean waves..."></textarea>
        
        <label for="model">Model</label>
        <select id="model">
            <option value="kling">Kling AI (Best Quality)</option>
            <option value="luma">Luma Dream Machine</option>
            <option value="runway">Runway Gen-3</option>
        </select>
        
        <label for="duration">Duration</label>
        <select id="duration">
            <option value="5">5 seconds</option>
            <option value="10">10 seconds</option>
        </select>
        
        <button id="generateBtn" onclick="generateVideo()">Generate Video</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Generating your video... This may take a few minutes.</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="result" id="result">
            <h3>✅ Video Generated!</h3>
            <video id="videoPlayer" controls></video>
            <a id="downloadLink" href="#" download>Download Video</a>
        </div>
    </div>
    
    <script>
        async function generateVideo() {
            const prompt = document.getElementById('prompt').value;
            const model = document.getElementById('model').value;
            const duration = document.getElementById('duration').value;
            
            if (!prompt) {
                showError('Please enter a prompt');
                return;
            }
            
            // Hide previous results
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').classList.remove('show');
            document.getElementById('loading').classList.add('show');
            document.getElementById('generateBtn').disabled = true;
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, model, duration })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('videoPlayer').src = data.videoUrl;
                    document.getElementById('downloadLink').href = data.videoUrl;
                    document.getElementById('result').classList.add('show');
                } else {
                    showError(data.error || 'Failed to generate video');
                }
            } catch (err) {
                showError('Error: ' + err.message);
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('generateBtn').disabled = false;
            }
        }
        
        function showError(msg) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = msg;
            errorEl.classList.add('show');
        }
    </script>
</body>
</html>
